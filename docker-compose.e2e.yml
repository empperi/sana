services:
  lb:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

  app:
    build: .
    deploy:
      replicas: 2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
    environment:
      - RUST_LOG=sana=debug,tower_http=debug
      - NATS_URL=nats://nats:4222
      - DATABASE_URL=postgres://sana_user:sana_password@db:5432/sana_db
      - COOKIE_KEY=${COOKIE_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8080}
      - ATTACHMENT_STORAGE_DIR=/app/data/attachments
    volumes:
      - attachment-data:/app/data/attachments

  nats:
    image: nats:alpine
    command: ["-js"]
    ports:
      - "4222:4222"
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 4222 || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sana_db
      POSTGRES_USER: sana_user
      POSTGRES_PASSWORD: sana_password
    # No volume mapping for pgdata to ensure it's ephemeral
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sana_user -d sana_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  attachment-data:


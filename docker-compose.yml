version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - nats
    environment:
      - RUST_LOG=sana=debug,tower_http=debug
      - NATS_URL=nats://nats:4222

  nats:
    image: nats:latest
    ports:
      - "4222:4222"
      - "8222:8222"

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: sana_db
      POSTGRES_USER: sana_user
      POSTGRES_PASSWORD: sana_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sana_user -d sana_db"]
      interval: 5s
      timeout: 5s
      retries: 5

events {}

http {
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/wasm text/javascript;
    gzip_min_length 1000;

    upstream sana_backend {
        # Using Docker's internal DNS to resolve the backend service
        server app:3000;
    }

    server {
        listen 80;

        # Route standard HTTP traffic to the backend
        location / {
            proxy_pass http://sana_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route WebSocket traffic to the backend
        location /ws {
            proxy_pass http://sana_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Cache static assets
        location ~* \.(js|wasm|css|png|svg|ico|webp)$ {
            proxy_pass http://sana_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
